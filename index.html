<html>

<style>
     

 *{
  margin: 0;
  padding: 0;
  box-sizing: bordder-box;
}

body{
  background-color: #141414;
  color: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content:center;
  align-items: center;
  min-height: 100vh;
}

.container {
    background-color: #1f1f1f;
    padding: 40px;
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

h1 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #e50914, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    color: #aaaaaa;
    margin-bottom: 24px;
    font-size: 15px;
    letter-spacing: 0.5px;
}

textarea {
    width: 100%;
    height: 120px;
    background-color: #2a2a2a;
    color: #ffffff;
    border: 1px solid #333333;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    resize: none;
    margin-bottom: 16px;
}

button {
    width: 100%;
    padding: 14px;
    background-color: #e50914;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #f40612;
    transition: background-color 0.2s ease;
}

#result {
    margin-top: 24px;
    color: #eeeeee;
    font-size: 15px;
    line-height: 1.8;
    white-space: pre-wrap;
    border-top: 1px solid #333333;
    padding-top: 20px;
}

.loader {
    width: 40px;
    height: 40px;
    border: 4px solid #333333;
    border-top: 4px solid #e50914;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 20px auto;
}

.hidden {
    display: none;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
	
    </style>
  

</head>

<!DOCTYPE html>
<html>
  <head>
    <title>What Should I Watch?</title>
  </head>
  
  <body>
    <div class="container">
        <h1>What Should I Watch Tonight?</h1>
        <p>Tell me your mood and I'll find something perfect for you.</p>
        <textarea id="moodInput" placeholder="e.g. I just finished Breaking Bad and feel empty..."></textarea>
        <button id="askBtn">Find Something 🎬</button>
        <div id="loader" class="loader hidden"></div>
        <div id="result"></div>
    </div>
</body>


  </html>
    

    <script>

      /* PASTE YOUR ENTIRE JS HERE */

const button = document.getElementById("askBtn");
const input = document.getElementById("moodInput");
const result = document.getElementById("result");

button.addEventListener("click", async function() {
    const mood = input.value;
    
    if (!mood) {
        result.innerText = "Tell me your mood first!";
        return;
    }

    result.innerText = "";
    document.getElementById("loader").classList.remove("hidden");
    button.disabled = true;
    button.innerText = "Loading...";

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer PLACEHOLDER"
        },
        body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
                {
                    role: "system",
                    content: "You are a movie, series and music recommendation expert. Carefully read what the user types. If they mention a movie, series or ask for something to watch — recommend 3 similar movies or series only, no music. If they mention a song, artist or ask for music — recommend 3 similar songs or artists only, no movies. If their mood is general — recommend a mix. Always explain why each recommendation fits. Be specific and enthusiastic."
                  
                },
                {
                    role: "user",
                    content: mood
                }
            ]
        })
    });

    const data = await response.json();
    document.getElementById("loader").classList.add("hidden");
    button.disabled = false;
    button.innerText = "Find Something 🎬";
    result.innerText = data.choices[0].message.content;
});



    </script>
  </body>
</html>
